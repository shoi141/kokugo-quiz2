function randInt(min,max){return Math.floor(Math.random()*(max-min+1))+min;}
function randomStars(n){return Array.from({length:n},()=>["⭐","🌟","✨"][randInt(0,2)]).join(" ");}
function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

<script type="text/babel">
const { useState, useEffect } = React;
const STORAGE_KEY = "yoji_best_streak";
const Q_OPTIONS = [5, 10, 15, 20];
const BTN = "linear-gradient(135deg,#f97316,#ea580c)";

function pickProblems(diff, total) {
  let pool = [];
  const ALL_NUMS = ["一","二","三","四","五","六","七","八","九","十","百"];

  if (diff === "meaning" || diff === "mix") {
    YOJI_MEANING.forEach(([word, read, correct, wrongs]) => {
      const opts = shuffle([correct, ...wrongs]);
      pool.push({
        qtype:"select", color:"#7c3aed",
        title:"意味を選ぼう", word, read,
        question:`「${word}（${read}）」の意味はどれですか？`,
        options: opts, answer: opts.indexOf(correct),
        explanation:`「${word}」\n意味：${correct}`,
      });
    });
  }

  if (diff === "structure" || diff === "mix") {
    const typeKeys = Object.keys(YOJI_TYPES);
    YOJI_STRUCTURE.forEach(([word, read, type, exp]) => {
      const opts = shuffle(typeKeys.map(k => YOJI_TYPES[k]));
      pool.push({
        qtype:"select", color:"#b45309",
        title:"組み立てを選ぼう", word, read,
        question:`「${word}（${read}）」の組み立てはどれですか？`,
        options: opts, answer: opts.indexOf(YOJI_TYPES[type]),
        explanation:`【${YOJI_TYPES[type]}】\n${exp}`,
      });
    });
  }

  if (diff === "number" || diff === "mix") {
    KANJI_NUMBER.forEach(([word, read, hint, meaning]) => {
      const makeWrong = (w, shift) =>
        w.replace(/[一二三四五六七八九十百]/g, m => {
          const i = ALL_NUMS.indexOf(m);
          return ALL_NUMS[(i + shift + ALL_NUMS.length) % ALL_NUMS.length];
        });
      const opts = shuffle([word, makeWrong(word,1), makeWrong(word,2), makeWrong(word,3)]);
      if(!opts.includes(word)) opts[0]=word;
      // 大見出しは□で表示（答えを隠す）
      const displayWord = word.replace(/[一二三四五六七八九十百]/g, "□");
      pool.push({
        qtype:"select", color:"#065f46",
        title:"漢数字を入れて完成",
        word: displayWord,
        read: "？？？？",
        question:`空欄に漢数字を入れて四字熟語を完成させましょう。\n${hint}\n（意味のヒント：${meaning}）`,
        options: opts, answer: opts.indexOf(word),
        explanation:`正解：「${word}（${read}）」\n${meaning}`,
      });
    });
  }

  if (diff === "goji" || diff === "mix") {
    // 誤字訂正用の紛らわしい誤り選択肢
    const gojiWrongsMap = {
      "温故知新": ["温古知新","温故知心","温古知心"],
      "意気消沈": ["意気消千","意気小沈","意気消深"],
      "心機一転": ["心気一転","心機一点","心気一点"],
      "前代未聞": ["前代未問","前代末聞","前代未文"],
      "諸行無常": ["諸行無情","諸行無情","諸行無状"],
      "異口同音": ["異句同音","異口同意","異句同意"],
      "一石二鳥": ["一石二長","一岩二鳥","一石三鳥"],
      "竜頭蛇尾": ["竜頭馬尾","竜頭蛇体","竜首蛇尾"],
    };
    GOJI_CORRECTION.forEach(([wrong, read, correct, change, exp]) => {
      const wrongs = gojiWrongsMap[correct] || [wrong,
        correct.split("").map((ch,i)=>i===1?"古":ch).join(""),
        correct.split("").map((ch,i)=>i===2?"大":ch).join(""),
      ];
      const candidates = [correct, ...wrongs].slice(0,4);
      const opts = shuffle(candidates);
      if(!opts.includes(correct)) opts[0]=correct;
      pool.push({
        qtype:"select", color:"#991b1b",
        title:"誤字を見つけよう", word: wrong, read,
        question:`「${wrong}（${read}）」には漢字の誤りが一字あります。\n正しいものはどれですか？`,
        options: opts.slice(0,4), answer: opts.slice(0,4).indexOf(correct),
        explanation:`正解：「${correct}」\n誤り：${change}\n${exp}`,
      });
    });
  }

  const shuffled = shuffle(pool);
  const result = [];
  const used = new Set();
  while(result.length < total) {
    const idx = Math.floor(Math.random() * shuffled.length);
    if(!used.has(idx) || shuffled.length < total) {
      used.add(idx);
      result.push({...shuffled[idx]});
    }
  }
  return result;
}

function SelectAnswer({ problem, checked, userAnswer, onAnswer }) {
  return (
    <div className="select-grid">
      {problem.options.map((opt, i) => {
        let cls = "select-btn";
        if(checked){
          if(i===problem.answer) cls+=" show-correct";
          else if(i===userAnswer) cls+=" wrong";
        }
        return (
          <button key={i} className={cls} onClick={()=>!checked&&onAnswer(i)}>
            <span style={{color:"#6b7280",marginRight:"8px",fontWeight:"normal"}}>{"①②③④"[i]}</span>
            {opt}
          </button>
        );
      })}
    </div>
  );
}

function App() {
  const [mode,setMode]     = useState("setup");
  const [diff,setDiff]     = useState("mix");
  const [totalQ,setTotalQ] = useState(10);
  const [problems,setProblems] = useState([]);
  const [current,setCurrent]   = useState(0);
  const [score,setScore]       = useState(0);
  const [streak,setStreak]     = useState(0);
  const [best,setBest]         = useState(0);
  const [checked,setChecked]   = useState(false);
  const [userAnswer,setUserAnswer] = useState(null);
  const [celeb,setCeleb]       = useState(false);
  const [isCorrect,setIsCorrect] = useState(false);

  useEffect(()=>{
    try{const s=localStorage.getItem(STORAGE_KEY);if(s)setBest(parseInt(s)||0);}catch(_){}
    setReviewBank(JSON.parse(localStorage.getItem('rv_yoji')||'[]'));
  },[]);
  const saveBest=v=>{try{localStorage.setItem(STORAGE_KEY,String(v));}catch(_){}};

  const startQuiz=()=>{
    setProblems(pickProblems(diff,totalQ));
    setCurrent(0);setScore(0);setStreak(0);
    setChecked(false);setUserAnswer(null);setCeleb(false);
    setMode("quiz");
  };

  const problem=problems[current]||null;

  const handleAnswer=ans=>{
    if(checked)return;
    setUserAnswer(ans);setChecked(true);
    const ok=ans===problem.answer;
    setIsCorrect(ok);
    if(ok){
      setScore(s=>s+1);const ns=streak+1;setStreak(ns);
      if(ns>best){setBest(ns);saveBest(ns);}
      setCeleb(true);setTimeout(()=>setCeleb(false),1800);
      try{const _b=JSON.parse(localStorage.getItem('rv_yoji')||'[]');const _id=(problem.title||'')+'|'+(problem.question||'');const _i=_b.findIndex(x=>x._id===_id);if(_i>=0){_b[_i].ok=(_b[_i].ok||0)+1;if(_b[_i].ok>=5)_b.splice(_i,1);localStorage.setItem('rv_yoji',JSON.stringify(_b));}setReviewBank([..._b]);}catch(_e){}
    }else{setStreak(0);
      try{const _b=JSON.parse(localStorage.getItem('rv_yoji')||'[]');const _id=(problem.title||'')+'|'+(problem.question||'');if(!_b.find(x=>x._id===_id)){const _s={...problem,_id,ok:0};_b.push(_s);localStorage.setItem('rv_yoji',JSON.stringify(_b));}setReviewBank([..._b]);}catch(_e){}}
  };

  const nextQuestion=()=>{
    const _end=current+1>=problems.length;
    if(_end&&mode==="review"){const _b=JSON.parse(localStorage.getItem('rv_yoji')||'[]');setReviewBank([..._b]);if(_b.length>0){startReview();}else{setMode("graduated");}return;}
    if(_end){setMode("result");return;}
    setCurrent(c=>c+1);
    setChecked(false);setUserAnswer(null);setCeleb(false);
  };

  const progress = problem ? (current/problems.length)*100 : 0;

  const DIFF_OPTIONS = [
    {key:"meaning",   emoji:"📙", name:"意味を選ぶ",       desc:"四字熟語の意味を4択で選ぶ（25語）"},
    {key:"structure", emoji:"📘", name:"組み立てを選ぶ",   desc:"二字×二字の構造を分類する"},
    {key:"number",    emoji:"🔢", name:"漢数字を入れて完成", desc:"（　）石（　）鳥 などの空欄を埋める"},
    {key:"goji",      emoji:"🔍", name:"誤字訂正",          desc:"四字熟語の誤った漢字を見つける"},
    {key:"mix",       emoji:"⭐", name:"ミックス",           desc:"全タイプからランダム出題"},
  ];

  if(mode==="setup") return(
    <div className="setup-wrap" style={{background:"#fff7ed"}}>
      <div className="setup-card">
        <div className="setup-emoji">📙</div>
        <h1 className="setup-title" style={{color:"#7c2d12"}}>四字熟語クイズ</h1>
        <p className="setup-sub">意味・組み立て・漢数字・誤字訂正（中学入試レベル）</p>
        {best>0&&<div className="best-badge" style={{background:"#ffedd5",border:"1.5px solid #fb923c",color:"#7c2d12"}}>🏆 最高連続記録：<strong>{best}問</strong></div>}
        <div className="qcount-section">分野を選ぶ</div>
        <div className="diff-btn-row">
          {DIFF_OPTIONS.map(d=>(
            <button key={d.key} className="diff-card-btn"
              style={{background:diff===d.key?"#ffedd5":"#f9fafb",
                      border:diff===d.key?"2px solid #f97316":"2px solid #e5e7eb",
                      boxShadow:diff===d.key?"0 3px 0 #f97316":"none"}}
              onClick={()=>setDiff(d.key)}>
              <span style={{fontSize:"22px"}}>{d.emoji}</span>
              <div>
                <div className="diff-name" style={{color:diff===d.key?"#7c2d12":"#1f2937"}}>{d.name}</div>
                <div className="diff-desc">{d.desc}</div>
              </div>
              {diff===d.key&&<span style={{marginLeft:"auto",fontSize:"18px"}}>✅</span>}
            </button>
          ))}
        </div>
        <div className="qcount-section">何問やる？</div>
        <div className="qcount-grid">
          {Q_OPTIONS.map(n=>(
            <button key={n} className="qcount-btn"
              style={{border:totalQ===n?"2px solid #f97316":"2px solid #dee2e6",
                      background:totalQ===n?"#f97316":"#f8f9fa",
                      color:totalQ===n?"#fff":"#495057",
                      boxShadow:totalQ===n?"0 3px 0 #ea580c":"none"}}
              onClick={()=>setTotalQ(n)}>{n}問</button>
          ))}
        </div>
        <button className="start-btn" style={{background:BTN,color:"#fff",boxShadow:"0 4px 0 #9a3412"}} onClick={startQuiz}>スタート！ 🚀</button>
      </div>
    </div>
  );


  if(mode === "graduated") return (
    <div className="setup-wrap" style={{background:"#f0fdf4"}}>
      <div className="setup-card">
        <div className="setup-emoji">{"🎓"}</div>
        <h2 className="setup-title" style={{color:"#166534"}}>{"復習バンク卒業！"}</h2>
        <p style={{fontSize:"14px",color:"#16a34a",marginBottom:"16px",fontWeight:"bold"}}>{"すべての問題を5回正解しました！"}</p>
        <div style={{background:"#dcfce7",borderRadius:"14px",padding:"16px",marginBottom:"16px",fontSize:"13px",color:"#166534",lineHeight:"1.8"}}>{"🌟 間違えた問題をすべてマスターしました！"}</div>
        <button className="start-btn"
          style={{background:"linear-gradient(135deg,#4ade80,#22c55e)",color:"#fff",boxShadow:"0 4px 0 #16a34a"}}
          onClick={()=>setMode("setup")}>{"もどる"}</button>
      </div>
    </div>
  );
  if(mode==="result"){
    const pct=Math.round((score/problems.length)*100);
    return(
      <div className="setup-wrap" style={{background:"#fff7ed"}}>
        <div className="setup-card">
          <div className="setup-emoji">{pct===100?"🏆":pct>=70?"🎉":"💪"}</div>
          <h2 className="setup-title" style={{color:"#7c2d12"}}>おわり！</h2>
          <p className="result-score">{problems.length}問中 <span className="result-big" style={{color:"#f97316"}}>{score}</span> 問正解</p>
          <div className="pct-bar-bg" style={{background:"#ffedd5"}}><div className="pct-bar-fill" style={{background:BTN,width:`${pct}%`}}/></div>
          <p className="pct-text">{pct}%</p>
          <div className="streak-result-row">
            <div className="streak-result-box"><div className="streak-result-label">この回の最高連続</div><div className="streak-result-val" style={{color:"#ef4444"}}>🔥 {streak}問</div></div>
            <div className="streak-result-box"><div className="streak-result-label">歴代最高連続</div><div className="streak-result-val" style={{color:"#f59f00"}}>🏆 {best}問</div></div>
          </div>
          <div style={{display:"flex",gap:"8px",marginTop:"16px"}}>
            <button className="start-btn" style={{background:BTN,color:"#fff",boxShadow:"0 4px 0 #9a3412"}} onClick={startQuiz}>もう一度</button>
            <button className="start-btn" style={{background:"#868e96",color:"#fff",boxShadow:"0 4px 0 #495057"}} onClick={()=>setMode("setup")}>設定へ</button>
          </div>
        </div>
      </div>
    );
  }

  if(!problem) return null;

  return(
    <div className="rika-root">
      {celeb&&(
        <div className="celeb-overlay">
          <div className="celeb-box">
            <div className="celeb-emoji">🎉</div>
            <div className="celeb-text" style={{color:"#7c2d12"}}>せいかい！</div>
            <div className="celeb-stars">{randomStars(5)}</div>
            {streak>=3&&<div className="celeb-streak" style={{background:"#f97316"}}>🔥 {streak}れんぞく！</div>}
            {streak===best&&streak>1&&<div className="celeb-streak" style={{background:"#f59f00",marginTop:"6px"}}>🏆 新記録！</div>}
          </div>
        </div>
      )}
      <div className="quiz-header">
        <button className="back-btn" onClick={()=>setMode("setup")}>← もどる</button>
        <span className="q-label">Q{current+1}<span className="q-total">/{problems.length}</span></span>
        <span className="streak-badge">🔥{streak}</span>
      </div>
      <div className="progress-bar-bg">
        <div className="progress-fill" style={{background:problem.color,width:`${progress}%`}}/>
      </div>
      <div className="problem-card" style={{borderTop:`5px solid ${problem.color}`}}>
        <div style={{fontWeight:"900",fontSize:"12px",color:problem.color,marginBottom:"4px"}}>{problem.title}</div>
        <div style={{fontSize:"28px",fontWeight:"900",textAlign:"center",padding:"12px 0 4px",letterSpacing:"0.1em"}}>{problem.word}</div>
        <div style={{textAlign:"center",fontSize:"13px",color:"#6b7280",marginBottom:"12px"}}>（{problem.read}）</div>
        <div style={{fontSize:"15px",fontWeight:"bold",lineHeight:"1.8",marginBottom:"12px",whiteSpace:"pre-line"}}>{problem.question}</div>
        <SelectAnswer problem={problem} checked={checked} userAnswer={userAnswer} onAnswer={handleAnswer}/>
      </div>
      {checked&&(
        <>
          <div style={{textAlign:"center",fontSize:"18px",fontWeight:"900",color:isCorrect?"#10b981":"#ef4444"}}>
            {isCorrect?"⭕ 正解！":"❌ 不正解"}
          </div>
          <div className="explanation-card">
            <div style={{fontWeight:"900",marginBottom:"4px",fontSize:"12px",color:"#92400e"}}>💡 解説</div>
            {problem.explanation.split("\n").map((line,i)=><div key={i}>{line}</div>)}
          </div>
          <button className="next-btn" style={{background:BTN,color:"#fff",boxShadow:"0 4px 0 #9a3412"}} onClick={nextQuestion}>
            {current+1>=problems.length?"結果を見る 🎉":"つぎへ →"}
          </button>
        </>
      )}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
